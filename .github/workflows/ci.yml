name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: |
          git rev-parse HEAD
          echo "--- payment.service.js ---"
          sed -n '1,60p' src/services/payment.service.js
      - run: npm ci
      - run: npm test
